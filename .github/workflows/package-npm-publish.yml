# Publish @arlequins packages with Lerna to npm (Node version from root .nvmrc).
# https://docs.github.com/actions/guides/publishing-nodejs-packages
name: Package NPM Publish

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    environment: packages

    permissions:
      contents: write
      packages: write
      issues: write
      pull-requests: write
      id-token: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          registry-url: 'https://registry.npmjs.org'
          cache: npm
          cache-dependency-path: |
            package-lock.json
            packages/oauth2-drizzle/package-lock.json
            packages/oauth2/package-lock.json
            packages/utils/package-lock.json

      - name: npm ci (root — Lerna)
        run: npm ci

      - name: npm ci (oauth2-drizzle)
        run: npm ci
        working-directory: packages/oauth2-drizzle

      - name: npm ci (utils)
        run: npm ci
        working-directory: packages/utils

      - name: npm ci (oauth2)
        run: npm ci
        working-directory: packages/oauth2

      - name: Configure Git user
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # Add NODE_AUTH_TOKEN (e.g. secrets.NPM_TOKEN) to env when publishing to npmjs.org.
      - name: Lerna publish
        run: npx lerna publish --yes --create-release github
        env:
          CI: true
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
